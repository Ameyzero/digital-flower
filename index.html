<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinetic Bloom — Neon Hand-Grown Bouquet</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #060608;
      overflow: hidden;
      font-family: "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
    }

    #stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(900px 500px at 50% 30%, rgba(70, 40, 12, 0.35), transparent 65%),
        #060608;
    }

    #frame {
      position: relative;
      line-height: 0;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      overflow: hidden;
    }

    #frame canvas {
      display: block;
      max-width: 96vw;
      max-height: 96vh;
      width: auto;
      height: auto;
    }

    .input_video {
      position: absolute;
      width: 2px;
      height: 2px;
      opacity: 0;
      pointer-events: none;
      top: -20px;
      left: -20px;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="frame">
      <video class="input_video" playsinline></video>
    </div>
  </div>

  <script>
    p5.disableFriendlyErrors = true;

    const W = 720;
    const VIDEO_H = 405;
    const ART_Y = VIDEO_H;
    const ART_H = 435;
    const H = VIDEO_H + ART_H;

    const HAND_CONNECTIONS = [
      [0, 1], [1, 2], [2, 3], [3, 4],
      [0, 5], [5, 6], [6, 7], [7, 8],
      [5, 9], [9, 10], [10, 11], [11, 12],
      [9, 13], [13, 14], [14, 15], [15, 16],
      [13, 17], [17, 18], [18, 19], [19, 20],
      [0, 17], [0, 9]
    ];

    const PAL = {
      gold: { fill: [255, 214, 62], edge: [255, 246, 176] },
      amber: { fill: [255, 158, 40], edge: [255, 208, 118] },
      ember: { fill: [240, 92, 30], edge: [255, 152, 84] }
    };

    const BOUQUET = [
      { ang: -0.86, dist: 322, size: 52, pal: 'ember', spin: -0.05, z: 0 },
      { ang: 0.82, dist: 318, size: 50, pal: 'amber', spin: 0.06, z: 1 },
      { ang: -0.44, dist: 292, size: 70, pal: 'gold', spin: -0.08, z: 2 },
      { ang: 0.46, dist: 286, size: 66, pal: 'amber', spin: 0.09, z: 3 },
      { ang: 0.02, dist: 176, size: 102, pal: 'gold', spin: 0.11, z: 4 }
    ];

    const state = {
      handsReady: false,
      cameraReady: false,
      trackingLive: false,
      lastResultTime: 0,
      handCount: 0,
      frameHands: [],
      targetGrow: 0.5,
      currentGrow: 0.5,
      targetBloom: 0.5,
      currentBloom: 0.5,
      statusKind: 'wait',
      statusText: 'booting pipeline'
    };

    let handsSolution = null;
    let cameraFeed = null;
    let videoEl = null;
    let initAttempts = 0;
    const MAX_INIT_ATTEMPTS = 120;

    function setup() {
      const c = createCanvas(W, H);
      c.parent('frame');
      pixelDensity(1);
      textFont('monospace');
      videoEl = document.querySelector('.input_video');
      bootstrapPipeline();
    }

    function bootstrapPipeline() {
      const hasHands = typeof window.Hands === 'function';
      const hasCamera = typeof window.Camera === 'function';

      if (hasHands && hasCamera) {
        launchHandTracking();
        return;
      }

      initAttempts += 1;
      if (initAttempts >= MAX_INIT_ATTEMPTS) {
        state.statusKind = 'fail';
        state.statusText = 'library load failed';
        return;
      }
      state.statusText = 'loading libraries';
      window.setTimeout(bootstrapPipeline, 120);
    }

    function launchHandTracking() {
      state.statusText = 'initializing model';

      handsSolution = new window.Hands({
        locateFile: function (file) {
          return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + file;
        }
      });

      handsSolution.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6,
        selfieMode: false
      });

      handsSolution.onResults(handleResults);
      state.handsReady = true;

      cameraFeed = new window.Camera(videoEl, {
        onFrame: async function () {
          if (!handsSolution) { return; }
          try {
            await handsSolution.send({ image: videoEl });
          } catch (err) {
            state.trackingLive = false;
          }
        },
        width: 640,
        height: 480
      });

      cameraFeed.start()
        .then(function () {
          state.cameraReady = true;
          state.statusKind = 'good';
          state.statusText = 'tracking live';
        })
        .catch(function () {
          state.cameraReady = false;
          state.statusKind = 'fail';
          state.statusText = 'camera blocked - use https';
        });
    }

    function handleResults(results) {
      state.lastResultTime = millis();
      state.trackingLive = true;

      const sets = results.multiHandLandmarks || false;
      if (!sets || sets.length === 0) {
        state.handCount = 0;
        state.frameHands = [];
        return;
      }

      state.handCount = sets.length;

      const collected = [];
      for (let h = 0; h < sets.length; h++) {
        const lm = sets[h];
        const mwx = 1 - lm[0].x;
        collected.push({ lm: lm, mwx: mwx });
      }
      collected.sort(function (a, b) { return a.mwx - b.mwx; });

      let growHand = null;
      let bloomHand = null;

      if (collected.length >= 2) {
        growHand = collected[0];
        bloomHand = collected[collected.length - 1];
        growHand.role = 'grow';
        bloomHand.role = 'bloom';
      } else {
        const only = collected[0];
        if (only.mwx < 0.5) {
          only.role = 'grow';
          growHand = only;
        } else {
          only.role = 'bloom';
          bloomHand = only;
        }
      }

      if (growHand) {
        const wristY = growHand.lm[0].y;
        state.targetGrow = constrain(map(wristY, 0.85, 0.15, 0, 1), 0, 1);
        growHand.value = state.targetGrow;
      }
      if (bloomHand) {
        const thumb = bloomHand.lm[4];
        const index = bloomHand.lm[8];
        const dx = thumb.x - index.x;
        const dy = thumb.y - index.y;
        const dz = (thumb.z || 0) - (index.z || 0);
        const pinch = Math.sqrt(dx * dx + dy * dy + dz * dz);
        state.targetBloom = constrain(map(pinch, 0.04, 0.25, 0, 1), 0, 1);
        bloomHand.value = state.targetBloom;
      }

      state.frameHands = collected;
    }

    function draw() {
      background(6, 6, 8);

      if (state.trackingLive && millis() - state.lastResultTime > 1200) {
        state.trackingLive = false;
        state.handCount = 0;
        state.frameHands = [];
      }

      state.currentGrow = lerp(state.currentGrow, state.targetGrow, 0.10);
      state.currentBloom = lerp(state.currentBloom, state.targetBloom, 0.12);

      drawVideoPanel();
      drawHandOverlays();
      drawArtBackdrop();
      drawBouquet();
      drawPictureInPicture();
      drawStatusPill();
    }

    function drawVideoPanel() {
      const ctx = drawingContext;
      noStroke();
      fill(12, 12, 16);
      rect(0, 0, W, VIDEO_H);

      if (videoEl && videoEl.readyState >= 2) {
        ctx.save();
        ctx.translate(W, 0);
        ctx.scale(-1, 1);
        try {
          ctx.drawImage(videoEl, 0, 0, W, VIDEO_H);
        } catch (err) {
          state.trackingLive = false;
        }
        ctx.restore();
        ctx.fillStyle = 'rgba(6,6,10,0.18)';
        ctx.fillRect(0, 0, W, VIDEO_H);
      } else {
        fill(150, 150, 170, 180);
        textAlign(CENTER, CENTER);
        textSize(14);
        text('awaiting camera feed', W / 2, VIDEO_H / 2);
        textAlign(LEFT, BASELINE);
      }

      noFill();
      stroke(255, 180, 40, 40);
      strokeWeight(2);
      line(0, VIDEO_H, W, VIDEO_H);
      noStroke();
    }

    function topX(nx) { return (1 - nx) * W; }
    function topY(ny) { return ny * VIDEO_H; }

    function drawHandOverlays() {
      if (!state.frameHands || state.frameHands.length === 0) { return; }
      const ctx = drawingContext;

      push();
      blendMode(ADD);
      for (let h = 0; h < state.frameHands.length; h++) {
        const hand = state.frameHands[h];
        const lm = hand.lm;

        ctx.shadowBlur = 16;
        ctx.shadowColor = 'rgba(255, 214, 40, 0.9)';
        stroke(255, 220, 46, 210);
        strokeWeight(3);
        for (let k = 0; k < HAND_CONNECTIONS.length; k++) {
          const a = lm[HAND_CONNECTIONS[k][0]];
          const b = lm[HAND_CONNECTIONS[k][1]];
          line(topX(a.x), topY(a.y), topX(b.x), topY(b.y));
        }

        const t4 = lm[4];
        const t8 = lm[8];
        stroke(255, 244, 150, 235);
        strokeWeight(2);
        line(topX(t4.x), topY(t4.y), topX(t8.x), topY(t8.y));

        ctx.shadowBlur = 0;
        noStroke();
        for (let p = 0; p < lm.length; p++) {
          fill(255, 236, 120, 210);
          circle(topX(lm[p].x), topY(lm[p].y), 5);
        }

        drawHandLabel(hand);
      }
      blendMode(BLEND);
      pop();
    }

    function drawHandLabel(hand) {
      const lm = hand.lm;
      let minY = 1;
      let sumX = 0;
      for (let p = 0; p < lm.length; p++) {
        if (lm[p].y < minY) { minY = lm[p].y; }
        sumX += lm[p].x;
      }
      const cx = topX(sumX / lm.length);
      const cy = topY(minY) - 16;

      const isGrow = hand.role === 'grow';
      const label = isGrow ? 'Grow' : 'Bloom';
      const val = (typeof hand.value === 'number') ? hand.value : 0;

      const ctx = drawingContext;
      ctx.shadowBlur = 14;
      ctx.shadowColor = 'rgba(255, 208, 40, 0.85)';
      fill(255, 226, 90, 240);
      noStroke();
      textAlign(CENTER, BASELINE);
      textStyle(BOLD);
      textSize(22);
      text(label + ': ' + nf(val, 1, 2), cx, cy);
      textStyle(NORMAL);
      textAlign(LEFT, BASELINE);
      ctx.shadowBlur = 0;
    }

    function drawArtBackdrop() {
      const ctx = drawingContext;
      const baseY = ART_Y + ART_H - 30;

      let g = ctx.createLinearGradient(0, ART_Y, 0, H);
      g.addColorStop(0, 'rgba(20, 12, 8, 1)');
      g.addColorStop(1, 'rgba(6, 6, 9, 1)');
      ctx.fillStyle = g;
      ctx.fillRect(0, ART_Y, W, ART_H);

      push();
      blendMode(ADD);
      const halo = lerp(150, 260, state.currentBloom);
      glowBlob(W / 2, baseY - 150 * state.currentGrow - 80, halo * 1.6, 255, 120, 24, 0.20);
      glowBlob(W / 2, baseY - 90, halo * 1.1, 255, 84, 20, 0.14);
      blendMode(BLEND);
      pop();
    }

    function glowBlob(x, y, r, cr, cg, cb, a) {
      const ctx = drawingContext;
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, 'rgba(' + cr + ',' + cg + ',' + cb + ',' + a + ')');
      g.addColorStop(1, 'rgba(' + cr + ',' + cg + ',' + cb + ',0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, TWO_PI);
      ctx.fill();
    }

    function drawBouquet() {
      const baseX = W / 2;
      const baseY = ART_Y + ART_H - 24;
      const gs = lerp(0.5, 1.0, state.currentGrow);
      const t = frameCount * 0.02;

      const slots = BOUQUET.slice().sort(function (a, b) { return a.z - b.z; });

      const centers = [];
      for (let i = 0; i < slots.length; i++) {
        const s = slots[i];
        const reach = s.dist * gs;
        const sway = sin(t * 0.8 + i * 1.3) * 10 * state.currentBloom;
        const dirX = Math.sin(s.ang);
        const dirY = -Math.cos(s.ang);
        const cx = baseX + dirX * reach + sway;
        const cy = baseY + dirY * reach;
        centers.push({ x: cx, y: cy, s: s });
      }

      for (let i = 0; i < centers.length; i++) {
        drawStem(baseX, baseY, centers[i].x, centers[i].y, centers[i].s.ang);
      }

      for (let i = 0; i < centers.length; i++) {
        const c = centers[i];
        drawDaisy(c.x, c.y, c.s.size * lerp(0.8, 1.0, gs), state.currentBloom, PAL[c.s.pal], t, c.s.spin);
      }
    }

    function drawStem(bx, by, cx, cy, ang) {
      const ctx = drawingContext;
      const midX = (bx + cx) / 2 + Math.sin(ang) * 22;
      const midY = (by + cy) / 2;
      push();
      blendMode(ADD);
      ctx.shadowBlur = 8;
      ctx.shadowColor = 'rgba(220, 220, 200, 0.5)';
      noFill();
      stroke(228, 224, 206, 190);
      strokeWeight(2);
      beginShape();
      vertex(bx, by);
      quadraticVertex(midX, midY, cx, cy);
      endShape();
      ctx.shadowBlur = 0;
      blendMode(BLEND);
      pop();
    }

    function drawDaisy(cx, cy, size, bloom, palette, t, spin) {
      push();
      blendMode(ADD);

      glowBlob(cx, cy, size * 1.9, palette.fill[0], palette.fill[1] * 0.6, palette.fill[2] * 0.3, 0.16);

      const petals = 22;
      const innerR = size * 0.16;
      const rot = t * spin;

      drawPetalRing(cx, cy, petals, innerR, size * lerp(0.72, 1.12, bloom), size * 0.10, rot, palette, 0.16, 130);
      drawPetalRing(cx, cy, petals, innerR * 0.7, size * lerp(0.42, 0.70, bloom), size * 0.075, rot + PI / petals, palette, 0.20, 150);

      const ctx = drawingContext;
      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.34);
      core.addColorStop(0, 'rgba(255, 252, 210, 0.95)');
      core.addColorStop(0.5, 'rgba(255, 206, 90, 0.55)');
      core.addColorStop(1, 'rgba(255, 150, 40, 0)');
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.arc(cx, cy, size * 0.34, 0, TWO_PI);
      ctx.fill();

      blendMode(BLEND);
      pop();
    }

    function drawPetalRing(cx, cy, count, innerR, petalLen, petalWid, rot, palette, fillA, edgeA) {
      for (let i = 0; i < count; i++) {
        const a = rot + (i / count) * TWO_PI;
        const dx = Math.cos(a);
        const dy = Math.sin(a);
        const px = -dy;
        const py = dx;

        const baseX = cx + dx * innerR;
        const baseY = cy + dy * innerR;
        const tipX = cx + dx * petalLen;
        const tipY = cy + dy * petalLen;
        const blX = baseX + px * petalWid;
        const blY = baseY + py * petalWid;
        const brX = baseX - px * petalWid;
        const brY = baseY - py * petalWid;

        fill(palette.fill[0], palette.fill[1], palette.fill[2], fillA * 255);
        stroke(palette.edge[0], palette.edge[1], palette.edge[2], edgeA);
        strokeWeight(1.2);
        beginShape();
        vertex(blX, blY);
        vertex(tipX, tipY);
        vertex(brX, brY);
        endShape(CLOSE);
      }
    }

    function drawPictureInPicture() {
      if (!videoEl || videoEl.readyState < 2) { return; }
      const pw = 150;
      const ph = 112;
      const pad = 16;
      const px = W - pw - pad;
      const py = H - ph - pad;
      const ctx = drawingContext;

      ctx.save();
      ctx.translate(px + pw, py);
      ctx.scale(-1, 1);
      try {
        ctx.drawImage(videoEl, 0, 0, pw, ph);
      } catch (err) {
        ctx.restore();
        return;
      }
      ctx.restore();

      noFill();
      stroke(255, 200, 60, 150);
      strokeWeight(1.5);
      rect(px, py, pw, ph);
      noStroke();

      ctx.shadowBlur = 8;
      ctx.shadowColor = 'rgba(255, 208, 40, 0.8)';
      fill(255, 226, 90, 230);
      textSize(11);
      textStyle(BOLD);
      text('LIVE', px + 8, py + 16);
      textStyle(NORMAL);
      ctx.shadowBlur = 0;
    }

    function drawStatusPill() {
      const cols = {
        good: [88, 224, 138],
        wait: [240, 198, 90],
        fail: [255, 111, 125]
      };
      const col = cols[state.statusKind] || cols.wait;

      noStroke();
      fill(12, 12, 18, 190);
      rect(14, 14, 152, 26, 8);
      fill(col[0], col[1], col[2]);
      circle(28, 27, 8);
      fill(220, 224, 240, 230);
      textSize(10.5);
      textAlign(LEFT, CENTER);
      text(state.statusText, 42, 28);
      textAlign(LEFT, BASELINE);
    }
  </script>
</body>
</html>
